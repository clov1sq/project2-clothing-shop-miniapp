name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: pip install -e '.[dev]'
      - name: Lint
        working-directory: backend
        run: ruff check app tests migrations
      - name: Typecheck
        working-directory: backend
        run: mypy app
      - name: Tests
        working-directory: backend
        run: pytest -q
      - name: Migration and seed smoke test
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:////tmp/project2-ci.db
        run: |
          alembic upgrade head
          python -m app.seed
          python -m app.seed
          alembic downgrade 0002_auth
          alembic upgrade head
      - name: Bot no-token startup
        working-directory: backend
        env:
          APP_ENV: test
          BOT_TOKEN: ''
        run: python -m app.bot.main

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Tests
        working-directory: frontend
        run: npm test
      - name: Production build
        working-directory: frontend
        run: npm run build
